name: 🔢 Version request
description: Request official support for a specific Minecraft version.
labels: [ 'version request' ]
type: 'feature'
body:
    -   type: checkboxes
        attributes:
            label: Please confirm the following.
            options:
                -   label: I checked the [existing issues](https://github.com/luminova-osu/Homerun/issues?q=is%3Aissue) for duplicate version requests
                    required: true
                -   label: The version I am requesting was released in the past 12 months and is not currently supported
                    required: false
                -   label: I have read and understood the [version support policy](https://github.com/luminova-osu/Homerun/blob/main/DEVELOPMENT.md#supported-versions)
                    required: true
    -   type: input
        attributes:
            label: For which version of Minecraft are you requesting support?
            description: Please indicate just the version number, e.g. "1.21.11" or "26.1".
        validations:
            required: true
    -   type: textarea
        attributes:
            label: Additional context
            description: Add any other context or screenshots about the suggested enhancement here.
        validations:
            required: false