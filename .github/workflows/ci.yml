name: CI

on:
    push:
    pull_request:

permissions:
    contents: write
    issues: read
    checks: write
    pull-requests: write


jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0  # Fetch all history including tags

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v3
                with:
                    gradle-version: wrapper

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Run tests
                run: ./gradlew test --no-daemon --stacktrace

            -   name: Upload test reports
                if: always()
                uses: actions/upload-artifact@v4
                with:
                    name: test-reports
                    path: build/reports/tests/test/
                    retention-days: 30

            -   name: Publish test results
                if: always()
                uses: EnricoMi/publish-unit-test-result-action@v2
                with:
                    files: |
                        build/test-results/test/*.xml
    build:
        runs-on: ubuntu-latest
        needs: test

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0  # Fetch all history including tags

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v3
                with:
                    gradle-version: wrapper

            -   name: Build plugin JAR
                run: ./gradlew shadowJar --no-daemon --stacktrace

            -   name: Print state
                run: |
                    git status --porcelain

            -   name: Rename plugin JAR
                id: rename
                run: |
                    cd build/libs/
                    PLUGIN_JAR=$(ls homerun-*-all.jar)
                    VERSION=$(echo $PLUGIN_JAR | sed -E 's/homerun-(.*)-all\.jar/\1/')
                    NEW_JAR="homerun-v${VERSION}.jar"
                    mv "$PLUGIN_JAR" "$NEW_JAR"
                    # Export the new JAR name for later steps
                    echo "PLUGIN_JAR=$NEW_JAR" >> $GITHUB_OUTPUT

            -   name: Upload plugin JAR
                uses: actions/upload-artifact@v4
                with:
                    name: plugin-jar
                    path: build/libs/${{ steps.rename.outputs.PLUGIN_JAR }}
                    retention-days: 30
    release:
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0  # Fetch all history including tags

            -   name: Download plugin JAR
                uses: actions/download-artifact@v4
                with:
                    name: plugin-jar

            -   name: Create release
                uses: softprops/action-gh-release@v2
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                with:
                    tag_name: ${{ steps.get_version.outputs.VERSION }}
                    name: ${{ steps.get_version.outputs.VERSION }}
                    draft: true
                    prerelease: false
                    files: homerun-v*.jar
                    generate_release_notes: false
